<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>机构数统计工具</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 40px;
            max-width: 600px;
            width: 100%;
        }
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
            font-size: 24px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 500;
        }
        input[type="text"] {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        input[type="text"]:focus {
            outline: none;
            border-color: #667eea;
        }
        .file-row {
            display: flex;
            align-items: center;
            margin-bottom: 12px;
            gap: 10px;
        }
        .file-row label {
            flex: 0 0 140px;
            margin-bottom: 0;
        }
        .file-row input[type="file"] {
            flex: 1;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 6px;
        }
        .file-status {
            font-size: 12px;
            color: #888;
            margin-left: 150px;
            margin-top: 4px;
        }
        .file-status.uploaded {
            color: green;
        }
        .btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
            margin-top: 20px;
        }
        .btn:hover {
            transform: translateY(-2px);
        }
        .btn:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        .result {
            margin-top: 20px;
            padding: 20px;
            background: #f0f0f0;
            border-radius: 8px;
        }
        .result a {
            display: block;
            padding: 10px;
            margin: 5px 0;
            background: white;
            color: #667eea;
            text-decoration: none;
            border-radius: 6px;
            text-align: center;
        }
        .result a:hover {
            background: #f8f9ff;
        }
        .loading {
            text-align: center;
            color: #666;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🏢 机构数统计工具</h1>
        <div style="text-align:center;color:#888;font-size:12px;margin-bottom:20px">版本 2.0</div>
        
        <div class="form-group">
            <label>📅 统计周期（如：3月、第1周）</label>
            <input type="text" id="time" placeholder="请输入统计周期" value="3月">
        </div>
        
        <div class="form-group">
            <label>📁 上传数据文件</label>
            
            <div class="file-row">
                <label>机构用户：</label>
                <input type="file" id="file_org_user" accept=".xlsx,.xls">
            </div>
            <div class="file-status" id="status_org_user"></div>
            
            <div class="file-row">
                <label>客户数据市场部：</label>
                <input type="file" id="file_market" accept=".xlsx,.xls">
            </div>
            <div class="file-status" id="status_market"></div>
            
            <div class="file-row">
                <label>客户数据战略中心：</label>
                <input type="file" id="file_strategy" accept=".xlsx,.xls">
            </div>
            <div class="file-status" id="status_strategy"></div>
            
            <div class="file-row">
                <label>历史客户：</label>
                <input type="file" id="file_history" accept=".xlsx,.xls">
            </div>
            <div class="file-status" id="status_history"></div>
            
            <div class="file-row">
                <label>未与财务核对模板：</label>
                <input type="file" id="file_template1" accept=".xlsx,.xls">
            </div>
            <div class="file-status" id="status_template1"></div>
            
            <div class="file-row">
                <label>与财务核对模板：</label>
                <input type="file" id="file_template2" accept=".xlsx,.xls">
            </div>
            <div class="file-status" id="status_template2"></div>
            
            <div class="file-row">
                <label>企业用户数：</label>
                <input type="file" id="file_company" accept=".xlsx,.xls">
            </div>
            <div class="file-status" id="status_company"></div>
            
            <div class="file-row">
                <label>全部历史客户：</label>
                <input type="file" id="file_all_history" accept=".xlsx,.xls">
            </div>
            <div class="file-status" id="status_all_history"></div>
            
            <div class="file-row">
                <label>预充值：</label>
                <input type="file" id="file_prepaid" accept=".xlsx,.xls">
            </div>
            <div class="file-status" id="status_prepaid"></div>
            
            <div class="file-row">
                <label>月结用户：</label>
                <input type="file" id="file_monthly" accept=".xlsx,.xls">
            </div>
            <div class="file-status" id="status_monthly"></div>
            
            <div class="file-row">
                <label>回款数据-需去重：</label>
                <input type="file" id="file_repayment" accept=".xlsx,.xls">
            </div>
            <div class="file-status" id="status_repayment"></div>
        </div>
        
        <button class="btn" id="submitBtn" onclick="submitForm()">
            开始统计
        </button>
        
        <div id="result"></div>
    </div>
    
    <script>
        // 文件选择后显示状态
        const fileIds = [
            'file_org_user', 'file_market', 'file_strategy', 'file_history',
            'file_template1', 'file_template2', 'file_company', 'file_all_history',
            'file_prepaid', 'file_monthly'
        ];
        
        fileIds.forEach(id => {
            document.getElementById(id).addEventListener('change', function() {
                const statusId = 'status_' + id.replace('file_', '');
                const statusEl = document.getElementById(statusId);
                if (this.files.length > 0) {
                    statusEl.textContent = '已选择: ' + this.files[0].name;
                    statusEl.className = 'file-status uploaded';
                } else {
                    statusEl.textContent = '';
                    statusEl.className = 'file-status';
                }
            });
        });
        
        function submitForm() {
            const time = document.getElementById('time').value;
            const btn = document.getElementById('submitBtn');
            const resultDiv = document.getElementById('result');
            
            if (!time) {
                alert('请输入统计周期');
                return;
            }
            
            btn.disabled = true;
            btn.textContent = '处理中...';
            resultDiv.innerHTML = '<div class="loading">正在处理，请稍候...</div>';
            
            const formData = new FormData();
            formData.append('time', time);
            
            // 添加各个文件
            formData.append('org_user', document.getElementById('file_org_user').files[0] || null);
            formData.append('market', document.getElementById('file_market').files[0] || null);
            formData.append('strategy', document.getElementById('file_strategy').files[0] || null);
            formData.append('history', document.getElementById('file_history').files[0] || null);
            formData.append('template1', document.getElementById('file_template1').files[0] || null);
            formData.append('template2', document.getElementById('file_template2').files[0] || null);
            formData.append('company', document.getElementById('file_company').files[0] || null);
            formData.append('all_history', document.getElementById('file_all_history').files[0] || null);
            formData.append('prepaid', document.getElementById('file_prepaid').files[0] || null);
            formData.append('monthly', document.getElementById('file_monthly').files[0] || null);
            formData.append('repayment', document.getElementById('file_repayment').files[0] || null);
            
            fetch('/upload_single', {
                method: 'POST',
                body: formData
            })
            .then(response => response.json())
            .then(data => {
                btn.disabled = false;
                btn.textContent = '开始统计';
                
                if (data.error) {
                    resultDiv.innerHTML = '<div class="result" style="color: red;">错误: ' + data.error + '</div>';
                } else if (data.success) {
                    resultDiv.innerHTML = '<div class="result">' +
                        '<h3>✅ 处理完成！</h3>' +
                        '<a href="/download/' + encodeURIComponent(data.files[0].path.split('/').pop()) + '" target="_blank">📥 下载未与财务核对版本</a>' +
                        '<a href="/download/' + encodeURIComponent(data.files[1].path.split('/').pop()) + '" target="_blank">📥 下载与财务核对版</a>' +
                        '<a href="/download/' + encodeURIComponent(data.files[2].path.split('/').pop()) + '" target="_blank">📥 下载补贴比例统计</a>' +
                        '</div>';
                }
            })
            .catch(err => {
                btn.disabled = false;
                btn.textContent = '开始统计';
                resultDiv.innerHTML = '<div class="result" style="color: red;">错误: ' + err + '</div>';
            });
        }
    </script>
</body>
</html>
